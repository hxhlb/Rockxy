name: Build & Validate

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel (e.g. dev, beta, stable)'
        required: false
        default: 'dev'
        type: string

permissions:
  contents: read

concurrency:
  group: build-validate-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict

  test:
    name: Test
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          else
            echo "Supported Xcode 16 app bundle not found on runner."
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          xcodebuild -version
      - name: Run tests
        run: |
          mkdir -p build/test-results
          xcodebuild -project Rockxy.xcodeproj \
            -scheme Rockxy \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            -resultBundlePath build/test-results/Rockxy.xcresult \
            test
      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rockxy-test-results
          path: build/test-results/Rockxy.xcresult
          if-no-files-found: ignore

  build-universal:
    name: Build (Universal)
    needs:
      - lint
      - test
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          else
            echo "Supported Xcode 16 app bundle not found on runner."
            ls -1 /Applications | grep '^Xcode' || true
            exit 1
          fi
          xcodebuild -version
      - name: Build arm64
        run: |
          xcodebuild -project Rockxy.xcodeproj \
            -scheme Rockxy \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build/arm64 \
            build
      - name: Build x86_64
        run: |
          xcodebuild -project Rockxy.xcodeproj \
            -scheme Rockxy \
            -configuration Release \
            -arch x86_64 \
            -derivedDataPath build/x86_64 \
            build
      - name: Create universal binary
        run: |
          helper_plist_name_from_app() {
            /usr/libexec/PlistBuddy -c 'Print :RockxyHelperPlistName' "$1/Contents/Info.plist"
          }

          helper_plist_path_from_app() {
            local app_path="$1"
            local helper_plist_name
            helper_plist_name="$(helper_plist_name_from_app "$app_path")"
            printf '%s/Contents/Library/LaunchDaemons/%s\n' "$app_path" "$helper_plist_name"
          }

          helper_bundle_program_from_plist() {
            /usr/libexec/PlistBuddy -c 'Print :BundleProgram' "$1"
          }

          APP_NAME="Rockxy"
          EXECUTABLE_NAME="Rockxy"
          ARTIFACT_BASENAME="Rockxy"
          ARM_APP="build/arm64/Build/Products/Release/$APP_NAME.app"
          X86_APP="build/x86_64/Build/Products/Release/$APP_NAME.app"
          ARM_HELPER_PLIST="$(helper_plist_path_from_app "$ARM_APP")"
          X86_HELPER_PLIST="$(helper_plist_path_from_app "$X86_APP")"
          HELPER_BUNDLE_PROGRAM="$(helper_bundle_program_from_plist "$ARM_HELPER_PLIST")"
          ARM_HELPER="$ARM_APP/$HELPER_BUNDLE_PROGRAM"
          X86_HELPER="$X86_APP/$HELPER_BUNDLE_PROGRAM"
          UNIVERSAL_APP="artifacts/$APP_NAME.app"
          UNIVERSAL_HELPER_PLIST="$(helper_plist_path_from_app "$UNIVERSAL_APP")"
          UNIVERSAL_HELPER="$UNIVERSAL_APP/$HELPER_BUNDLE_PROGRAM"

          mkdir -p artifacts
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          # Combine main executable into universal binary
          lipo -create \
            "$ARM_APP/Contents/MacOS/$EXECUTABLE_NAME" \
            "$X86_APP/Contents/MacOS/$EXECUTABLE_NAME" \
            -output "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE_NAME"

          # Combine the embedded privileged helper.
          if [ ! -f "$ARM_HELPER" ] || [ ! -f "$X86_HELPER" ]; then
            echo "Expected helper binary at $HELPER_BUNDLE_PROGRAM in both build outputs."
            exit 1
          fi
          if [ ! -f "$ARM_HELPER_PLIST" ] || [ ! -f "$X86_HELPER_PLIST" ]; then
            echo "Expected helper plist in both build outputs."
            exit 1
          fi
          plutil -lint "$ARM_HELPER_PLIST"
          plutil -lint "$X86_HELPER_PLIST"
          lipo -create "$ARM_HELPER" "$X86_HELPER" -output "$UNIVERSAL_HELPER"

          # Verify universal binaries
          lipo -info "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE_NAME"
          lipo -info "$UNIVERSAL_HELPER"
          plutil -lint "$UNIVERSAL_HELPER_PLIST"

          cd artifacts && zip -r "$ARTIFACT_BASENAME-universal.zip" "$APP_NAME.app"
      - name: Verify bundled helper resources
        run: |
          normalize_identifier_set_json() {
            python3 -c 'import json, sys; expected = sorted(set(sys.argv[1].split())); actual = sorted(set(json.loads(sys.argv[2]))); payload = {"expected": expected, "actual": actual, "missing": sorted(set(expected) - set(actual)), "extra": sorted(set(actual) - set(expected))}; print(json.dumps(payload))' "$1" "$2"
          }

          verify_helper_resources_in_app() {
            local app_path="$1"
            local label="$2"
            local info_plist="$app_path/Contents/Info.plist"
            local helper_plist_name
            local helper_mach_service_name
            local allowed_callers
            local plist_path
            local helper_bundle_program
            local helper_path
            local actual_identifier_json
            local normalized_sets
            local missing_identifiers
            local extra_identifiers

            helper_plist_name="$(/usr/libexec/PlistBuddy -c 'Print :RockxyHelperPlistName' "$info_plist")"
            helper_mach_service_name="$(/usr/libexec/PlistBuddy -c 'Print :RockxyHelperMachServiceName' "$info_plist")"
            allowed_callers="$(/usr/libexec/PlistBuddy -c 'Print :RockxyAllowedCallerIdentifiers' "$info_plist")"
            plist_path="$app_path/Contents/Library/LaunchDaemons/$helper_plist_name"

            if [ ! -f "$plist_path" ]; then
              echo "Missing helper plist in $label: $plist_path"
              exit 1
            fi
            plutil -lint "$plist_path"

            helper_bundle_program="$(/usr/libexec/PlistBuddy -c 'Print :BundleProgram' "$plist_path")"
            helper_path="$app_path/$helper_bundle_program"
            if [ ! -f "$helper_path" ]; then
              echo "Missing helper binary in $label: $helper_path"
              exit 1
            fi

            if [ "$(/usr/libexec/PlistBuddy -c 'Print :Label' "$plist_path")" != "$helper_mach_service_name" ]; then
              echo "Helper label mismatch in $label: expected $helper_mach_service_name"
              exit 1
            fi

            actual_identifier_json="$(plutil -extract AssociatedBundleIdentifiers json -o - "$plist_path")"
            normalized_sets="$(normalize_identifier_set_json "$allowed_callers" "$actual_identifier_json")"
            missing_identifiers="$(python3 -c 'import json,sys; print(\" \".join(json.loads(sys.stdin.read())[\"missing\"]))' <<<"$normalized_sets")"
            extra_identifiers="$(python3 -c 'import json,sys; print(\" \".join(json.loads(sys.stdin.read())[\"extra\"]))' <<<"$normalized_sets")"

            if [ -n "$missing_identifiers" ] || [ -n "$extra_identifiers" ]; then
              echo "AssociatedBundleIdentifiers mismatch in $label"
              echo "  Missing: ${missing_identifiers:-<none>}"
              echo "  Extra:   ${extra_identifiers:-<none>}"
              exit 1
            fi
          }

          verify_helper_resources_in_app "build/arm64/Build/Products/Release/Rockxy.app" "arm64 app bundle"
          verify_helper_resources_in_app "build/x86_64/Build/Products/Release/Rockxy.app" "x86_64 app bundle"
          verify_helper_resources_in_app "artifacts/Rockxy.app" "universal app bundle"
      - uses: actions/upload-artifact@v4
        with:
          name: rockxy-universal
          path: artifacts/Rockxy-universal.zip
          if-no-files-found: error
