name: Build & Validate

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel (e.g. dev, beta, stable)'
        required: false
        default: 'dev'
        type: string

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict

  build-universal:
    name: Build (Universal)
    needs: lint
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build arm64
        run: |
          xcodebuild -project Rockxy.xcodeproj \
            -scheme Rockxy \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build/arm64 \
            build
      - name: Build x86_64
        run: |
          xcodebuild -project Rockxy.xcodeproj \
            -scheme Rockxy \
            -configuration Release \
            -arch x86_64 \
            -derivedDataPath build/x86_64 \
            build
      - name: Create universal binary
        run: |
          APP_NAME="Rockxy"
          EXECUTABLE_NAME="Rockxy"
          ARTIFACT_BASENAME="Rockxy"
          ARM_APP="build/arm64/Build/Products/Release/$APP_NAME.app"
          X86_APP="build/x86_64/Build/Products/Release/$APP_NAME.app"
          HELPER_SUBPATH="Contents/Library/HelperTools/RockxyHelperTool"
          HELPER_PLIST_SUBPATH="Contents/Library/LaunchDaemons/com.amunx.rockxy.helper.plist"
          ARM_HELPER="$ARM_APP/$HELPER_SUBPATH"
          X86_HELPER="$X86_APP/$HELPER_SUBPATH"
          ARM_HELPER_PLIST="$ARM_APP/$HELPER_PLIST_SUBPATH"
          X86_HELPER_PLIST="$X86_APP/$HELPER_PLIST_SUBPATH"
          UNIVERSAL_APP="artifacts/$APP_NAME.app"
          UNIVERSAL_HELPER="$UNIVERSAL_APP/$HELPER_SUBPATH"
          UNIVERSAL_HELPER_PLIST="$UNIVERSAL_APP/$HELPER_PLIST_SUBPATH"

          mkdir -p artifacts
          cp -R "$ARM_APP" "$UNIVERSAL_APP"

          # Combine main executable into universal binary
          lipo -create \
            "$ARM_APP/Contents/MacOS/$EXECUTABLE_NAME" \
            "$X86_APP/Contents/MacOS/$EXECUTABLE_NAME" \
            -output "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE_NAME"

          # Combine the embedded privileged helper.
          if [ ! -f "$ARM_HELPER" ] || [ ! -f "$X86_HELPER" ]; then
            echo "Expected helper binary at $HELPER_SUBPATH in both build outputs."
            exit 1
          fi
          if [ ! -f "$ARM_HELPER_PLIST" ] || [ ! -f "$X86_HELPER_PLIST" ]; then
            echo "Expected helper plist at $HELPER_PLIST_SUBPATH in both build outputs."
            exit 1
          fi
          plutil -lint "$ARM_HELPER_PLIST"
          plutil -lint "$X86_HELPER_PLIST"
          lipo -create "$ARM_HELPER" "$X86_HELPER" -output "$UNIVERSAL_HELPER"

          # Verify universal binaries
          lipo -info "$UNIVERSAL_APP/Contents/MacOS/$EXECUTABLE_NAME"
          lipo -info "$UNIVERSAL_HELPER"
          plutil -lint "$UNIVERSAL_HELPER_PLIST"

          cd artifacts && zip -r "$ARTIFACT_BASENAME-universal.zip" "$APP_NAME.app"
      - name: Verify bundled helper resources
        run: |
          verify_helper_resources_in_app() {
            local app_path="$1"
            local label="$2"
            local helper_path="$app_path/Contents/Library/HelperTools/RockxyHelperTool"
            local plist_path="$app_path/Contents/Library/LaunchDaemons/com.amunx.rockxy.helper.plist"

            if [ ! -f "$helper_path" ]; then
              echo "Missing helper binary in $label: $helper_path"
              exit 1
            fi
            if [ ! -f "$plist_path" ]; then
              echo "Missing helper plist in $label: $plist_path"
              exit 1
            fi
            plutil -lint "$plist_path"
          }

          verify_helper_resources_in_app "build/arm64/Build/Products/Release/Rockxy.app" "arm64 app bundle"
          verify_helper_resources_in_app "build/x86_64/Build/Products/Release/Rockxy.app" "x86_64 app bundle"
          verify_helper_resources_in_app "artifacts/Rockxy.app" "universal app bundle"
      - uses: actions/upload-artifact@v4
        with:
          name: rockxy-universal
          path: artifacts/Rockxy-universal.zip
